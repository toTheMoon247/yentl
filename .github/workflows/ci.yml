name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shared-package:
    name: Shared Swift Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Show Swift version
        run: swift --version
      - name: Build
        working-directory: shared
        run: swift build
      - name: Test
        working-directory: shared
        run: swift test

  ios-yentl:
    name: Yentl iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl/Yentl.xcodeproj \
            -scheme Yentl \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  ios-yentl-matchmaker:
    name: Yentl Matchmaker iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl-matchmaker/YentlMatchmaker.xcodeproj \
            -scheme YentlMatchmaker \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint

  db-tests:
    name: Supabase pgTAP Tests
    # Linux runner: the local Supabase stack runs on Docker, which the macOS
    # runners don't provide. Exercises the migrations + RPCs against a real
    # Postgres (supabase/tests/*.sql).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: supabase start
      - name: Run pgTAP tests
        run: supabase test db
      - name: Stop local Supabase
        if: always()
        run: supabase stop
