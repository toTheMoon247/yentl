name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shared-package:
    name: Shared Swift Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Show Swift version
        run: swift --version
      - name: Build
        working-directory: shared
        run: swift build
      - name: Test
        working-directory: shared
        run: swift test

  ios-yentl:
    name: Yentl iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl/Yentl.xcodeproj \
            -scheme Yentl \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  ios-yentl-matchmaker:
    name: Yentl Matchmaker iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl-matchmaker/YentlMatchmaker.xcodeproj \
            -scheme YentlMatchmaker \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint

  db-tests:
    name: Supabase pgTAP Tests
    # Linux runner: the local Supabase stack runs on Docker, which the macOS
    # runners don't provide. Exercises the migrations + RPCs against a real
    # Postgres (supabase/tests/*.sql).
    runs-on: ubuntu-latest
    env:
      # The CLI's telemetry client can hang on shutdown ("Timeout while
      # shutting down PostHog") and exit non-zero *after* the tests have
      # already passed, failing the job on a green run. Opt out.
      DO_NOT_TRACK: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned deliberately. This was `latest`, which meant a CLI release
          # could break CI with no change to this repo — and did: a release
          # between 2026-06-11 and 2026-06-18 stopped the local stack granting
          # table privileges, turning CI red on a docs-only commit for five
          # weeks. Bump this on purpose, not by surprise.
          version: 2.109.0
      - name: Start local Supabase
        run: supabase start
      - name: Run pgTAP tests
        run: supabase test db
      - name: Stop local Supabase
        if: always()
        run: supabase stop
