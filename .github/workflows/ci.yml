name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shared-package:
    name: Shared Swift Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Show Swift version
        run: swift --version
      - name: Build
        working-directory: shared
        run: swift build
      - name: Test
        working-directory: shared
        run: swift test

  ios-yentl:
    name: Yentl iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Set git default branch to main
        run: git config --global init.defaultBranch main
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl/Yentl.xcodeproj \
            -target Yentl \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO

  ios-yentl-matchmaker:
    name: Yentl Matchmaker iOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Set git default branch to main
        run: git config --global init.defaultBranch main
      - name: Build
        run: |
          xcodebuild build \
            -project apps/yentl-matchmaker/YentlMatchmaker.xcodeproj \
            -target YentlMatchmaker \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint
