# SwiftLint configuration for the Yentl monorepo.
# Local: `brew install swiftlint` then `swiftlint` from the repo root.
# CI runs it in .github/workflows/ci.yml.

excluded:
  - .build
  - shared/.build
  - shared/.swiftpm
  - "**/DerivedData"

# Allow common Apple Xcode template idioms during early development.
# Tighten as the codebase grows.
disabled_rules:
  - trailing_comma
  - todo
  - identifier_name

line_length:
  warning: 140
  error: 200

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
